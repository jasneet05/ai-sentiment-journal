weather:
  api:
    key: ${WEATHER_API_KEY:dummy}
server:
  port: ${SERVER_PORT:8080}
spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy}
  redis:
    host: ${REDIS_HOST:localhost}
    port: 15641
    password: ${REDIS_PASSWORD:}
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/journaldb}
      database: journaldb
      auto-index-creation: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${JAVA_EMAIL:dummy}
    password: ${JAVA_EMAIL_PASSWORD:dummy}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: weekly-sentiment-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring:
          json:
            trusted:
              packages: net.journalApp.model
    properties:
      security:
        protocol: SASL_SSL
      sasl:
        mechanism: SCRAM-SHA-256
        jaas:
          config: ${KAFKA_JAAS_CONFIG:org.apache.kafka.common.security.scram.ScramLoginModule required username='${KAFKA_API_KEY:}' password='${KAFKA_API_SECRET:}';}
      session:
        timeout:
          ms: 45000
jwt:
  secret: ${JWT_SECRET:}
gemini:
  api:
    key: ${GEMINI_API_KEY:}
    model: gemini-2.0-flash